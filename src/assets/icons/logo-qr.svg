<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Capelo (Graduation Cap) -->
  <g fill="white">
    <!-- Top bar -->
    <rect x="25" y="30" width="150" height="15" rx="2" />
    
    <!-- Diamond/Rhombus top -->
    <path d="M100 50 L180 80 L100 110 L20 80 Z" />
    
    <!-- Tassel (Franja) -->
    <path d="M140 75 L140 135 L130 150 L150 150 Z" />
    
    <!-- Base cap -->
    <path d="M60 100 L60 160 C60 170 80 175 100 175 C120 175 140 170 140 160 L140 100 Z" />
  </g>
</svg>